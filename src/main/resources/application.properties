spring.application.name=urlshortner

# H2 file database (persists under ./data/)
spring.datasource.url=jdbc:h2:file:./data/urlshortener;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# ISO-8601 strings in JSON for React (e.g. expiresAt)
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=8084
app.base.url=http://localhost:8084/

# Optional: when stored longUrl has no http(s) scheme, prepend this for redirects (e.g. https://mysite.com)
# app.long-url-base=https://example.com

# Comma-separated origins for the React dev server
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
